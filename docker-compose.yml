
services:
  # 1. THE MESSAGE BROKER
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  # 2. THE INGESTION NODE
  producer:
    build: .
    command: python producer.py
    depends_on:
      - redis

  # 3. THE NLP WORKER
  worker:
    build: .
    command: python worker.py
    depends_on:
      - redis
    # We map a volume so the SQLite database file persists locally and can be shared with the dashboard
    volumes:
      - ./sentiment_data.db:/app/sentiment_data.db

  # 4. THE FRONTEND
  dashboard:
    build: .
    command: python dashboard.py
    ports:
      - "8050:8050"
    depends_on:
      - worker
    volumes:
      - ./sentiment_data.db:/app/sentiment_data.db