
services:
  # 1. THE MESSAGE BROKER (Lightweight Alpine Version)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # 2. THE INGESTION NODE
  producer:
    build: .
    command: python producer.py
    depends_on:
      - redis
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app  # Maps your local directory so code changes update instantly

  # 3. THE NLP WORKER
  worker:
    build: .
    command: python worker.py
    depends_on:
      - redis
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app  # Maps local code directory
      - ./sentiment_data.db:/app/sentiment_data.db  # Shares SQLite database file

  # 4. THE FRONTEND
  dashboard:
    build: .
    command: python dashboard.py
    ports:
      - "8050:8050"
    depends_on:
      - worker
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app  # Maps local code directory
      - ./sentiment_data.db:/app/sentiment_data.db  # Reads shared SQLite database file